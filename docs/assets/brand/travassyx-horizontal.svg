<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 190" role="img" aria-labelledby="title desc">
  <title id="title">Travassyx Platform horizontal logo</title>
  <desc id="desc">Official Travassyx Platform horizontal logo with pulse symbol and clean wordmark.</desc>
  <defs>
    <linearGradient id="travassyx-pulse-mark" x1="28" y1="34" x2="158" y2="146" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="0.48" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="travassyx-word" x1="216" y1="64" x2="540" y2="102" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="0.58" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="720" height="190" rx="28" fill="#ffffff"/>
  <g transform="translate(34 37)">
    <rect x="0" y="54" width="34" height="62" rx="17" fill="url(#travassyx-pulse-mark)" opacity="0.92"/>
    <rect x="46" y="25" width="34" height="91" rx="17" fill="url(#travassyx-pulse-mark)"/>
    <rect x="92" y="0" width="34" height="116" rx="17" fill="url(#travassyx-pulse-mark)" opacity="0.96"/>
    <rect x="138" y="41" width="34" height="75" rx="17" fill="url(#travassyx-pulse-mark)" opacity="0.9"/>
    <circle cx="17" cy="29" r="17" fill="#38bdf8"/>
    <circle cx="155" cy="17" r="17" fill="#7c3aed"/>
  </g>
  <text x="220" y="98" fill="url(#travassyx-word)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="57" font-weight="850" letter-spacing="1">Travassyx</text>
  <text x="224" y="126" fill="#64748b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="650">Hybrid Operations &amp; FinOps</text>
</svg>
